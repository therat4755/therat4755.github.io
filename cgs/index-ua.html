<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Smart Lock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script>
        // Tailwind dark mode configuration
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .action-button {
            transition: background-color 0.2s, transform 0.1s;
        }
        .action-button:active {
            transform: scale(0.95);
        }
        /* Custom scrollbar for dark mode */
        .dark ::-webkit-scrollbar {
            width: 8px;
        }
        .dark ::-webkit-scrollbar-track {
            background: #202124;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #3c4043;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-white text-[#3c4043] dark:bg-[#202124] dark:text-[#e8eaed]">

    <!-- Dark Mode Toggle Button -->
    <button id="theme-toggle" class="fixed top-4 right-4 z-50 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-[#303134] transition-colors" aria-label="Toggle dark mode">
        <svg id="theme-toggle-dark-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
    </button>

    <!-- Status Bar Mockup -->

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center px-8 pt-12">
        
        <!-- Header Section -->
        <div class="flex flex-col items-center mb-16">
            <div class="mb-4">
                <!-- Yellow Lock Icon -->
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="10" width="14" height="11" rx="2" fill="#FBBC04"/>
                    <path d="M8 10V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V10" stroke="#FBBC04" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M11 15L13 17M13 15L11 17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-[28px] font-normal text-[#5f6368] dark:text-[#9aa0a6]">
                <span class="font-medium text-[#3c4043] dark:text-[#e8eaed]">Google</span> Smart Lock
            </h1>
        </div>

        <!-- Grid Actions -->
        <div class="grid grid-cols-2 gap-x-10 gap-y-12 w-full max-w-xs">
            
            <!-- Manage Accounts -->
            <a href="https://myaccount.google.com/" class="flex flex-col items-center text-center group outline-none">
                <div class="w-20 h-20 rounded-full bg-[#E8F0FE] dark:bg-[#3c4043] flex items-center justify-center mb-3 action-button group-hover:bg-[#d2e3fc] dark:group-hover:bg-[#4a4d51]">
                    <svg class="w-10 h-10 text-[#1967D2] dark:text-[#8ab4f8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7zM19 11l-2 2m0 0l-2-2m2 2v4" />
                        <circle cx="19" cy="9" r="2" stroke-width="1.5" />
                    </svg>
                </div>
                <span class="text-sm leading-tight font-medium">Керувати обліковим записом</span>
            </a>

            <!-- Generate Security Code -->
            <a href="https://g.co/sc" class="flex flex-col items-center text-center group outline-none">
                <div class="w-20 h-20 rounded-full bg-[#E8F0FE] dark:bg-[#3c4043] flex items-center justify-center mb-3 action-button group-hover:bg-[#d2e3fc] dark:group-hover:bg-[#4a4d51]">
                    <svg class="w-10 h-10 text-[#1967D2] dark:text-[#8ab4f8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <span class="text-sm leading-tight font-medium">Генерувати код безпеки</span>
            </a>

            <!-- Help -->
            <a href="https://codeberg.org/therat4755/google-custom-web-sign-in.git" class="flex flex-col items-center text-center group outline-none">
                <div class="w-20 h-20 rounded-full border border-gray-200 dark:border-[#3c4043] flex items-center justify-center mb-3 action-button group-hover:bg-gray-50 dark:group-hover:bg-[#303134]">
                    <svg class="w-10 h-10 text-gray-500 dark:text-[#9aa0a6]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <span class="text-sm leading-tight font-medium">Codeberg</span>
            </a>

            <!-- Feedback -->
            <a href="/settings.html" class="flex flex-col items-center text-center group outline-none">
                <div class="w-20 h-20 rounded-full border border-gray-200 dark:border-[#3c4043] flex items-center justify-center mb-3 action-button group-hover:bg-gray-50 dark:group-hover:bg-[#303134]">
                    <svg class="w-10 h-10 text-gray-500 dark:text-[#9aa0a6]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
                        <rect x="11.5" y="11.5" width="1" height="1" fill="currentColor" />
                    </svg>
                </div>
                <span class="text-sm leading-tight font-medium">Налаштування</span>
            </a>

        </div>
    </main>

    <!-- Footer Description -->

    <script>
        // Theme Management Script
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        // Check local storage or system preference
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            // Toggle icons
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            // If is dark mode
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });
    </script>
</body>
</html>
