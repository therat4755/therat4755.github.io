    <script w-tid="57">
        // Update existing script to reflect new default values
        document.getElementById('bitDepthSlider').addEventListener('input', function() {

        });

        document.getElementById('sampleRateSlider').addEventListener('input', function() {

        document.getElementById('audioInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const originalAudioElement = document.getElementById('originalAudio');
            const inputAudioLabel = document.getElementById('inputAudioLabel');
            
            // Add null check and type check
            if (!file || !file.type.startsWith('audio/')) {
                alert('Please select a valid audio file');
                this.value = ''; // Reset the file input
                return;
            }

            try {
                originalAudioElement.src = URL.createObjectURL(file);
                originalAudioElement.style.display = 'block';
                inputAudioLabel.style.display = 'block';
            } catch (error) {
                console.error('Error creating object URL:', error);
                alert('Error loading audio file');
                this.value = ''; // Reset the file input
            }
        });

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('audioInput');
            const convertedAudioElement = document.getElementById('convertedAudio');
            const progressBar = document.getElementById('progressBar');

            if (!fileInput.files.length) {
                alert('Please upload an audio file first');
                return;
            }

            progressBar.style.display = 'block';

            const file = fileInput.files[0];
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                // Enhanced bitcrusher conversion
                const bitDepth = parseInt(document.getElementById('bitDepthSlider').value);
                const sampleRateReduction = parseInt(document.getElementById('sampleRateSlider').value);
                const convertedBuffer = await createBitcrushedBuffer(audioContext, audioBuffer, bitDepth, sampleRateReduction, (progress) => {
                    // Optional: You could update the text to show progress if desired
                    // progressBar.textContent = `Turning Your Audio Into An 8-bit Audio... ${progress}%`;
                });

                // Convert to WAV
                const wavBlob = bufferToWave(convertedBuffer, convertedBuffer.length);
                convertedAudioElement.src = URL.createObjectURL(wavBlob);
                convertedAudioElement.style.display = 'block';
                
                // Show output audio label
                document.getElementById('outputAudioLabel').style.display = 'block';
                
                progressBar.style.display = 'none';
            } catch (error) {
                console.error('Conversion error:', error);
                alert('Error converting audio');
                progressBar.style.display = 'none';
            }
        });

        // Enhanced bitcrusher effect function
        async function createBitcrushedBuffer(audioContext, sourceBuffer, bitDepth, sampleRateReduction, progressCallback) {
            const channels = sourceBuffer.numberOfChannels;
            const sampleRate = sourceBuffer.sampleRate;
            const length = sourceBuffer.length;

            const convertedBuffer = audioContext.createBuffer(channels, length, sampleRate);

            for (let channel = 0; channel < channels; channel++) {
                const channelData = sourceBuffer.getChannelData(channel);
                const convertedChannelData = convertedBuffer.getChannelData(channel);

                for (let i = 0; i < length; i++) {
                    // Bit depth reduction
                    const step = Math.pow(2, bitDepth);
                    let sample = channelData[i];
                    
                    // Quantize the sample to reduce bit depth
                    sample = Math.round(sample * step) / step;

                    // Sample rate reduction
                    if (i % sampleRateReduction !== 0) {
                        sample = convertedChannelData[Math.floor(i / sampleRateReduction) * sampleRateReduction] || sample;
                    }

                    convertedChannelData[i] = sample;

                    // Progress callback
                    if (i % 1000 === 0) {
                        progressCallback(Math.round((i / length) * 100));
                    }
                }
            }

            return convertedBuffer;
        }

        // Existing bufferToWave function remains the same
        function bufferToWave(abuffer, len) {
            const numOfChan = abuffer.numberOfChannels;
            const length = len * numOfChan * 2 + 44;
            const buffer = new ArrayBuffer(length);
            const view = new DataView(buffer);
            const channels = []; 
            let i, sample;
            let offset = 0;
            let pos = 0;

            // Write WAV header
            setUint32(0x46464952);                         // "RIFF"
            setUint32(length - 8);                         // file length - 8
            setUint32(0x45564157);                         // "WAVE"

            setUint32(0x20746d66);                         // "fmt " chunk
            setUint32(16);                                 // length = 16
            setUint16(1);                                  // PCM (uncompressed)
            setUint16(numOfChan);
            setUint32(abuffer.sampleRate);
            setUint32(abuffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
            setUint16(numOfChan * 2);                      // block-align
            setUint16(16);                                 // 16-bit (hardcoded)

            setUint32(0x61746164);                         // "data" - chunk
            setUint32(length - pos - 4);                   // chunk length

            // Write interleaved data
            for (i = 0; i < abuffer.numberOfChannels; i++)
                channels.push(abuffer.getChannelData(i));

            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {             // interleave channels
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); // clamp
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0; // scale to 16-bit signed int
                    view.setInt16(pos, sample, true);          // write 16-bit sample
                    pos += 2;
                }
                offset++; // next source sample
            }

            // Helper function to set uint
            function setUint16(data) {
                view.setUint16(pos, data, true);
                pos += 2;
            }

            function setUint32(data) {
                view.setUint32(pos, data, true);
                pos += 4;
            }

            return new Blob([buffer], { type: "audio/wav" });
        }
